services:
  backend:
    build:
      context: ./innvoy-backend
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./innvoy-backend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./innvoy-frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./innvoy-frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
